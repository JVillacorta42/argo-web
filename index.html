<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aeon Trespass Odyssey</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght=700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06080f;
    --bg2: #0d1220;
    --border: #1e2a45;
    --text: #e0e8f0;
    --text-muted: #9aaabb;
    --gold: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #bg-video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(6,8,15,0.15);
    z-index: 1;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .content {
    position: fixed;
    bottom: 40px;
    left: 0; right: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }
  h1 {
    font-size: 1.4rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 0.85rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-align: center;
    margin-bottom: 50px;
  }
  .cycles {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 380px;
  }
  .cycle-btn {
    display: block;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.55);
    color: #ffffff;
    padding: 18px 32px;
    border-radius: 6px;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s;
    cursor: pointer;
    font-family: 'Cinzel', Georgia, serif;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .cycle-btn:hover {
    background: rgba(255,255,255,0.28);
    transform: translateY(-2px);
  }
  .cycle-btn .num {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
    font-weight: 700;
  }
  .cycle-btn .name {
    font-size: 1.05rem;
    color: #ffffff;
    letter-spacing: 0.06em;
    font-weight: 900;
  }
  .matrix-link {
    margin-top: 32px;
    font-size: 0.8rem;
    color: var(--text-muted);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 8px 20px;
    border-radius: 4px;
    letter-spacing: 0.1em;
    transition: color 0.2s, border-color 0.2s;
  }
  .matrix-link:hover { color: var(--gold); border-color: var(--gold); }
</style>
</head>
<body>
  <audio id="portada-audio" loop preload="auto">
    <source src="https://github.com/JVillacorta42/argo-web/releases/download/v1.0-media/musica.portada.mp3" type="audio/mpeg">
  </audio>
  <video id="bg-video" autoplay loop muted playsinline preload="auto">
    <source src="portada_2.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>
  <div class="content">
  <div class="cycles">
    <a class="cycle-btn" href="argo.html" onclick="var a=document.getElementById('portada-audio');if(a){a.volume=0.5;a.play().catch(function(){});}">
      <span class="num">Ciclo IV</span>
      <span class="name">Jardines del Crecimiento Infinito</span>
    </a>
    <a class="cycle-btn" href="Ciclo_5/c5_app.html" onclick="var a=document.getElementById('portada-audio');if(a){a.volume=0.5;a.play().catch(function(){});}">
      <span class="num">Ciclo V</span>
      <span class="name">El Profeta</span>
    </a>
  </div>

</div>
<script>
  (function() {
    var a = document.getElementById('portada-audio');
    if (!a) return;
    a.volume = 0.5;
    function tryPlay() {
      a.play().catch(function() {});
    }
    // Intento inmediato (funciona si el navegador lo permite)
    tryPlay();
    // Si no, al primer click o toque en cualquier parte
    function onFirstInteraction() {
      tryPlay();
      document.removeEventListener('click', onFirstInteraction);
      document.removeEventListener('touchstart', onFirstInteraction);
    }
    document.addEventListener('click', onFirstInteraction);
    document.addEventListener('touchstart', onFirstInteraction);
  })();
</script>
</body>
</html>
